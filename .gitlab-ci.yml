image: docker:25.0.3
variables:
  DOCKER_HOST: tcp://docker:2375/
  DOCKER_TLS_CERTDIR: ""
  DOCKER_DRIVER: overlay2
services:
  - docker:dind

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

stages:
  - build
  - deploy

build-frontend:
  stage: build
  image: node:25.3.0-alpine
  tags:
    - dev-container
  script:
    - npm install
    - npm run build
  artifacts:
    paths:
      - dist/
      - Dockerfile      
      - nginx.conf     
    expire_in: 1 hour

deploy-frontend:
  stage: deploy
  image: quay.io/openshift/origin-cli:latest
  tags:
    - dev-container
  needs:
    - build-frontend
  script:
    # Koneksi via Agent
    - kubectl config use-context pcs-8/test-orientasi:ort-agent
    
    - oc start-build test-orientasi-react --from-dir=. -n test-orientasi --follow
    
    # Restart Pod
    - oc rollout restart deployment/test-orientasi-react -n test-orientasi
    - oc rollout status deployment/test-orientasi-react -n test-orientasi