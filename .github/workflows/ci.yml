name: Build & Deploy to OpenShift

on:
  push:
    branches: [ "main" ]

jobs:
  build-deploy:
    runs-on: self-hosted

    env:
      REGISTRY: image-registry.openshift-image-registry.svc:5000
      NAMESPACE: test-orientasi

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25.3.0'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies and build
        run: |
          npm ci
          npm run build

      - name: Prepare build context
        run: |
          mkdir -p build-context
          cp -r dist build-context/
          cp Dockerfile build-context/
          cp nginx.conf build-context/

      - name: Start OpenShift Binary Build
        run: |
          BUILD=$(oc start-build frontend-app \
            --from-dir=build-context \
            -n ${{ env.NAMESPACE }} \
            -o name)
          echo "BUILD_NAME=$BUILD" >> $GITHUB_ENV

      - name: Stream build logs
        run: |
          oc logs -f $BUILD_NAME -n ${{ env.NAMESPACE }}

      - name: Verify build
        run: |
          for i in {1..12}; do
            STATUS=$(oc get $BUILD_NAME -n ${{ env.NAMESPACE }} -o jsonpath='{.status.phase}')
            echo "Build status (attempt $i): $STATUS"
            
            if [ "$STATUS" = "Complete" ] || [ "$STATUS" = "Succeeded" ]; then
              echo "Build completed successfully!"
              exit 0
            fi
            
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Error" ]; then
              echo "Build failed!"
              exit 1
            fi
            
            sleep 5
          done
          
          echo "Build status check timeout"
          exit 1

      - name: Rollout restart
        run: |
          oc rollout restart deployment/frontend-app -n ${{ env.NAMESPACE }}
          
          oc rollout status deployment/frontend-app -n ${{ env.NAMESPACE }}